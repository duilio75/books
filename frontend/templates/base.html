{% load webpack_loader static %}
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>{% block title %}My amazing site{% endblock %}</title>
    {% stylesheet_pack 'app' %}
</head>
<body>
  {% block header %}{% endblock %}
  {% block main %}{% endblock %}
  {% block footer %}{% endblock %}
{% javascript_pack 'app' %}
</body>
</html>
