<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>{{ page.title }}</title>
    <style>
        :root { color-scheme: light dark; }
        * { box-sizing: border-box; }
        body {
            margin: 0;
            font-family: system-ui, -apple-system, "Segoe UI", Roboto, sans-serif;
            line-height: 1.6;
            color: #1a1a1a;
            background: #fafafa;
        }
        article {
            max-width: 760px;
            margin: 0 auto;
            padding: 3rem 1.5rem;
        }
        h1 { margin: 0 0 0.25rem; font-size: 2.5rem; }
        .subtitle { margin: 0 0 2rem; font-size: 1.25rem; color: #666; }
        img.hero { width: 100%; height: auto; border-radius: 12px; margin-bottom: 2rem; }
        .body :is(h1, h2, h3) { line-height: 1.3; }
        .body img { max-width: 100%; height: auto; }
    </style>
</head>
<body>
    <article>
        <h1>{{ page.title }}</h1>
        {% if page.subtitle %}<p class="subtitle">{{ page.subtitle }}</p>{% endif %}
        {% if page.image %}<img class="hero" src="{{ page.image.url }}" alt="{{ page.title }}">{% endif %}
        <div class="body">{{ page.body|safe }}</div>
    </article>
</body>
</html>
