<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Traveling Books</title>
    <style>
        :root { color-scheme: light dark; }
        * { box-sizing: border-box; }
        body {
            margin: 0;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            font-family: system-ui, -apple-system, "Segoe UI", Roboto, sans-serif;
            background: linear-gradient(135deg, #1e3a5f 0%, #2d6a8f 100%);
            color: #fff;
            padding: 2rem;
        }
        .card {
            max-width: 640px;
            width: 100%;
            background: rgba(255, 255, 255, 0.08);
            backdrop-filter: blur(8px);
            border: 1px solid rgba(255, 255, 255, 0.15);
            border-radius: 16px;
            padding: 3rem 2.5rem;
            text-align: center;
        }
        h1 { margin: 0 0 0.5rem; font-size: 2.25rem; }
        p.lead { margin: 0 0 2rem; opacity: 0.85; font-size: 1.1rem; }
        .links { display: flex; flex-wrap: wrap; gap: 0.75rem; justify-content: center; }
        a.btn {
            display: inline-block;
            padding: 0.6rem 1.2rem;
            border-radius: 8px;
            text-decoration: none;
            font-weight: 600;
            background: rgba(255, 255, 255, 0.15);
            color: #fff;
            border: 1px solid rgba(255, 255, 255, 0.25);
            transition: background 0.15s ease;
        }
        a.btn:hover { background: rgba(255, 255, 255, 0.28); }
        footer { margin-top: 2rem; font-size: 0.85rem; opacity: 0.6; }
    </style>
</head>
<body>
    <main class="card">
        <h1>📚 Traveling Books</h1>
        <p class="lead">The backend API is up and running.</p>
        <div class="links">
            <a class="btn" href="/admin/">Admin</a>
            <a class="btn" href="/api/">API</a>
            <a class="btn" href="/api/user/register/">Register</a>
        </div>
        <footer>Powered by Django</footer>
    </main>
</body>
</html>
