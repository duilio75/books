# nginx reverse proxy for the tb-backend container (managed alongside Certbot).
#
# www is the canonical host:
#   * www.traveling-books.eu  (443) -> proxies to the app (gunicorn)
#   * traveling-books.eu      (443) -> 301 redirect to www
#   * either host on port 80        -> 301 redirect to https://www
#
# The certificate already covers both names (expanded earlier):
#   sudo certbot --nginx --expand -d traveling-books.eu -d www.traveling-books.eu

upstream tb_backend {
    server 127.0.0.1:8000;
    keepalive 32;
}

# Canonical host: serve the app over https on www.
server {
    server_name www.traveling-books.eu;

    location / {
        proxy_pass http://tb_backend;

        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        proxy_http_version 1.1;
        proxy_set_header Connection "";

        proxy_connect_timeout 30s;
        proxy_read_timeout    60s;
        client_max_body_size  10m;
    }

    listen 443 ssl; # managed by Certbot
    ssl_certificate /etc/letsencrypt/live/traveling-books.eu/fullchain.pem; # managed by Certbot
    ssl_certificate_key /etc/letsencrypt/live/traveling-books.eu/privkey.pem; # managed by Certbot
    include /etc/letsencrypt/options-ssl-nginx.conf; # managed by Certbot
    ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem; # managed by Certbot
}

# Apex over https: redirect everything to the canonical www host.
server {
    server_name traveling-books.eu;

    location / {
        return 301 https://www.traveling-books.eu$request_uri;
    }

    listen 443 ssl; # managed by Certbot
    ssl_certificate /etc/letsencrypt/live/traveling-books.eu/fullchain.pem; # managed by Certbot
    ssl_certificate_key /etc/letsencrypt/live/traveling-books.eu/privkey.pem; # managed by Certbot
    include /etc/letsencrypt/options-ssl-nginx.conf; # managed by Certbot
    ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem; # managed by Certbot
}

# Port 80 for both hosts: redirect to the canonical https www.
server {
    listen 80;
    server_name traveling-books.eu www.traveling-books.eu;
    return 301 https://www.traveling-books.eu$request_uri;
}
